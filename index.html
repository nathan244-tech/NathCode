<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosey Tetris</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            margin: 10px 0;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        canvas {
            background-color: #0f3460;
            border: 4px solid #e94560;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #16213e;
            padding: 20px;
            border-radius: 5px;
            border: 2px solid #e94560;
            width: 150px;
        }
        .score-box {
            text-align: center;
        }
        .score-box h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #a2a8d3;
        }
        .score-box p {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .controls {
            font-size: 0.9rem;
            color: #a2a8d3;
            line-height: 1.6;
        }
        kbd {
            background: #e94560;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<h1>Mosey Tetris</h1>

<div id="game-container">
    <canvas id="tetris" width="300" height="600"></canvas>
    
    <div class="info-panel">
        <div class="score-box">
            <h2>Score</h2>
            <p id="score">0</p>
        </div>
        <div class="score-box">
            <h2>Lines</h2>
            <p id="lines">0</p>
        </div>
        <div class="controls">
            <strong>Controls:</strong><br><br>
            <kbd>←</kbd> <kbd>→</kbd> Move<br><br>
            <kbd>↑</kbd> Rotate<br><br>
            <kbd>↓</kbd> Drop<br>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    
    // Scale everything up so we don't have to deal with large pixel math
    ctx.scale(30, 30);

    // Tetromino Colors
    const COLORS = [
        null,
        '#00FFFF', // I (Cyan)
        '#0000FF', // J (Blue)
        '#FFA500', // L (Orange)
        '#FFFF00', // O (Yellow)
        '#00FF00', // S (Green)
        '#800080', // T (Purple)
        '#FF0000'  // Z (Red)
    ];

    // Tetromino Matrices
    function createPiece(type) {
        if (type === 'T') return [[0,0,0], [6,6,6], [0,6,0]];
        if (type === 'O') return [[4,4], [4,4]];
        if (type === 'L') return [[0,3,0], [0,3,0], [0,3,3]];
        if (type === 'J') return [[0,2,0], [0,2,0], [2,2,0]];
        if (type === 'I') return [[0,1,0,0], [0,1,0,0], [0,1,0,0], [0,1,0,0]];
        if (type === 'S') return [[0,5,5], [5,5,0], [0,0,0]];
        if (type === 'Z') return [[7,7,0], [0,7,7], [0,0,0]];
    }

    // Create empty board matrix
    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // Game variables
    const arena = createMatrix(10, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let gameOver = false;

    // Draw a matrix onto the canvas
    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    ctx.fillStyle = COLORS[value];
                    ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    
                    // Add slight border for visibility
                    ctx.lineWidth = 0.05;
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    // Draw the whole game frame
    function draw() {
        ctx.fillStyle = '#0f3460';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);

        if (gameOver) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e94560';
            ctx.font = '1.5px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 5, 10);
            ctx.fillStyle = 'white';
            ctx.font = '0.7px Arial';
            ctx.fillText('Press SPACE to Restart', 5, 12);
        }
    }

    // Collision detection
    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    // Merge piece into arena
    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    // Player drop logic
    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    // Player move left/right
    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    // Spawn a new piece
    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        
        // If it collides immediately, game over
        if (collide(arena, player)) {
            gameOver = true;
        }
    }

    // Matrix rotation logic
    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    // Player rotate logic with wall kick correction
    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    // Check for completed lines
    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y >= 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            
            player.score += rowCount * 100;
            player.lines += 1;
            rowCount *= 2;
            
            // Speed up slightly
            if (dropInterval > 200) {
                dropInterval -= 20;
            }
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = player.score;
        document.getElementById('lines').innerText = player.lines;
    }

    // Main Game Loop
    function update(time = 0) {
        if (gameOver) {
            draw();
            return;
        }
        
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        
        if (dropCounter > dropInterval) {
            playerDrop();
        }
        
        draw();
        requestAnimationFrame(update);
    }

    // Restart game
    function resetGame() {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.lines = 0;
        dropInterval = 1000;
        gameOver = false;
        updateScore();
        playerReset();
        update();
    }

    // Input Handling
    document.addEventListener('keydown', event => {
        // Prevent default scrolling for arrow keys and space
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
            event.preventDefault();
        }

        if (gameOver) {
            if (event.code === 'Space') resetGame();
            return;
        }

        if (event.keyCode === 37) { // Left Arrow
            playerMove(-1);
        } else if (event.keyCode === 39) { // Right Arrow
            playerMove(1);
        } else if (event.keyCode === 40) { // Down Arrow
            playerDrop();
        } else if (event.keyCode === 38) { // Up Arrow
            playerRotate(1);
        }
    });

    // Start
    playerReset();
    updateScore();
    update();
</script>

</body>
</html>
