<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #70c5ce; /* Sky blue */
            border: 4px solid #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="500"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game Variables
    let frames = 0;
    let score = 0;
    let bestScore = localStorage.getItem("flappy_best_score") || 0;
    let gameOver = false;

    // Bird Object
    const bird = {
        x: 50,
        y: 150,
        width: 20,
        height: 20,
        velocity: 0,
        gravity: 0.25,
        jump: -5.5,
        
        draw() {
            ctx.fillStyle = "#f1c40f"; // Bird color (yellow)
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
            
            // Eye
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 + 4, this.y + this.height/2 - 4, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 + 5, this.y + this.height/2 - 4, 1.5, 0, Math.PI * 2);
            ctx.fill();
        },
        
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            
            // Hit the floor or ceiling
            if (this.y + this.height >= canvas.height || this.y <= 0) {
                triggerGameOver();
            }
        },
        
        flap() {
            this.velocity = this.jump;
        }
    };

    // Pipes Object
    const pipes = {
        items: [],
        width: 50,
        gap: 130, // Space between top and bottom pipe
        dx: 2,    // Speed of pipes moving left
        
        draw() {
            ctx.fillStyle = "#2ecc71"; // Pipe color (green)
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                
                // Top pipe
                ctx.fillRect(p.x, 0, this.width, p.top);
                // Bottom pipe
                ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
            }
        },
        
        update() {
            // Add a new pipe every 100 frames
            if (frames % 100 === 0) {
                // Calculate random pipe heights
                let topHeight = Math.random() * (canvas.height - this.gap - 80) + 40;
                let bottomHeight = canvas.height - topHeight - this.gap;
                this.items.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: bottomHeight,
                    passed: false
                });
            }
            
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx;

                // Collision Detection
                // Check if bird's right edge passes pipe's left edge, and bird's left passes pipe's right
                if (bird.x + bird.width > p.x && bird.x < p.x + this.width) {
                    // Check if bird hits top or bottom pipe
                    if (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom) {
                        triggerGameOver();
                    }
                }

                // Update Score
                if (p.x + this.width < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                }

                // Remove pipes that have gone off screen
                if (p.x + this.width < 0) {
                    this.items.shift();
                    i--;
                }
            }
        },
        
        reset() {
            this.items = [];
        }
    };

    // UI and Score
    function drawScore() {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.font = "bold 30px Arial";
        
        ctx.fillText(score, canvas.width / 2 - 10, 50);
        ctx.strokeText(score, canvas.width / 2 - 10, 50);

        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#fff";
            ctx.font = "bold 40px Arial";
            ctx.fillText("Game Over", 95, canvas.height / 2 - 40);
            
            ctx.font = "20px Arial";
            ctx.fillText(`Score: ${score}`, 160, canvas.height / 2);
            ctx.fillText(`Best: ${bestScore}`, 160, canvas.height / 2 + 30);
            
            ctx.font = "16px Arial";
            ctx.fillText("Click or press Space to Restart", 90, canvas.height / 2 + 80);
        }
    }

    function triggerGameOver() {
        gameOver = true;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("flappy_best_score", bestScore);
        }
    }

    // Main Game Loop
    function loop() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        bird.draw();
        pipes.draw();
        drawScore();

        if (!gameOver) {
            bird.update();
            pipes.update();
            frames++;
            requestAnimationFrame(loop);
        }
    }

    // Reset Game State
    function resetGame() {
        bird.y = 150;
        bird.velocity = 0;
        pipes.reset();
        score = 0;
        frames = 0;
        gameOver = false;
        loop();
    }

    // Input Handling
    function handleInput(e) {
        // Prevent default spacebar scrolling
        if (e.type === "keydown" && e.code === "Space") {
            e.preventDefault();
        }
        
        if (gameOver) {
            resetGame();
        } else {
            bird.flap();
        }
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.key === "ArrowUp") handleInput(e);
    });
    canvas.addEventListener("mousedown", handleInput);
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handleInput(e);
    }, { passive: false });

    // Start the game
    loop();
</script>

</body>
</html>
